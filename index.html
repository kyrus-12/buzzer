<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUESS-piratory System Button</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { 
            --bg-dark: #1a1a2e; 
            --accent: #27ae60; 
            --danger: #e74c3c; 
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body { 
            margin: 0; 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            background: var(--bg-dark); 
            color: white; 
            transition: background 0.5s ease; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        .hidden { display: none !important; }

        /* Login Styling */
        #login-screen { flex: 1; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle, #2c3e50 0%, #000 100%); }
        .login-card { 
            background: rgba(255, 255, 255, 0.95); 
            color: #333; 
            padding: 40px; 
            border-radius: 24px; 
            text-align: center; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 320px;
        }
        input { 
            display: block; width: 100%; margin: 15px 0; padding: 14px; 
            border-radius: 10px; border: 1px solid #ddd; font-size: 1rem; box-sizing: border-box;
        }
        .login-btn { 
            background: var(--accent); color: white; border: none; width: 100%;
            padding: 12px; border-radius: 10px; cursor: pointer; font-size: 1.1rem; font-weight: bold; 
            transition: 0.3s;
        }
        .login-btn:hover { filter: brightness(1.1); transform: translateY(-2px); }

        /* Wait Screen (Buzzer Section) */
        #wait-screen { 
            flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; 
            padding: 20px; text-align: center;
        }

        #wait-text { font-size: 2.5rem; text-shadow: 0 4px 10px rgba(0,0,0,0.3); margin-bottom: 30px; }

        /* Student Question (Below Buzzer) */
        .question-display {
            background: var(--glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 25px;
            border-radius: 20px;
            margin-top: 30px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .q-title-text { color: #f1c40f; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 10px; }
        .q-body-text { font-size: 2rem; font-weight: 600; line-height: 1.3; }

        /* Admin Section & Blur Logic */
        #main-section { height: 100vh; overflow-y: auto; padding: 40px 20px; text-align: center; transition: filter 0.3s ease; }
        body.modal-open #main-section { filter: blur(8px); pointer-events: none; }

        .grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
            gap: 20px; max-width: 900px; margin: 30px auto; 
        }
        .box { 
            background: var(--glass); border: 1px solid var(--glass-border); 
            padding: 25px; border-radius: 15px; cursor: pointer; 
            transition: all 0.3s; font-weight: bold; font-size: 1.2rem; 
        }
        .box:hover { background: rgba(255, 255, 255, 0.2); transform: translateY(-5px); }

        /* Admin Modal Overlay */
        #admin-modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center;
            z-index: 1000;
        }

        .admin-modal-content {
            background: #2c3e50; border: 2px solid var(--glass-border);
            padding: 40px; border-radius: 30px; text-align: center;
            width: 90%; max-width: 550px; box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        .modal-btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 30px; }
        .ctrl-btn { border: none; padding: 12px 24px; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; flex: 1; }
        .btn-check { background: var(--accent); }
        .btn-wrong { background: var(--danger); }
        .btn-close { background: #7f8c8d; }
        .ctrl-btn:hover { filter: brightness(1.2); transform: scale(1.05); }

        /* Buzzer Button */
        #buzz-btn { 
            width: 220px; height: 220px; border-radius: 50%; border: 10px solid white; 
            background: linear-gradient(145deg, #e74c3c, #c0392b); color: white; 
            font-size: 2rem; font-weight: 900; cursor: pointer; transition: 0.2s; 
            box-shadow: 0 15px 0 #922b21, 0 20px 30px rgba(0,0,0,0.4); 
            display: block; outline: none;
        }
        #buzz-btn:active { transform: translateY(10px); box-shadow: 0 5px 0 #922b21; }
        #buzz-btn:disabled { background: #555; box-shadow: 0 5px 0 #333; opacity: 0.6; cursor: not-allowed; transform: translateY(10px); }

        .fs-btn { position: fixed; bottom: 20px; left: 20px; background: var(--glass); border: 1px solid var(--glass-border); color: white; padding: 8px 15px; border-radius: 8px; cursor: pointer; }
        .reset-link { margin-top: 40px; color: #aaa; cursor: pointer; font-size: 0.8rem; }
        footer { padding: 20px; font-size: 0.7rem; opacity: 0.5; }
        #yt-player { position: absolute; top: -1000px; visibility: hidden; }

        /* Music Control Panel */
        .music-controls {
            position: fixed;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 8px;
            z-index: 2000; /* Above modals */
            background: var(--glass);
            padding: 10px;
            border-radius: 12px;
            backdrop-filter: blur(5px);
            border: 1px solid var(--glass-border);
        }

        .m-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
        }

        .m-btn:hover { background: var(--accent); }
        .m-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="yt-player"></div>

    <div id="login-screen">
        <div class="login-card">
            <h2 style="margin-top:0">GUESS-piratory Login</h2>
            <input type="text" id="groupName" placeholder="Group Color (e.g. Red)">
            <input type="password" id="groupPass" placeholder="Password">
            <button class="login-btn" onclick="login()">Enter Game</button>
            <p style="font-size: 10px; color: #999; margin-top: 15px;"></p>
        </div>
    </div>

    <div id="wait-screen" class="hidden">
        <h1 id="wait-text">READY</h1>
        <button id="buzz-btn" onclick="sendBuzz()">I KNOW!</button>
        <div id="live-q-notif" class="question-display hidden">
            <span id="q-title-sync" class="q-title-text">QUESTION TITLE</span>
            <div id="q-text-sync" class="q-body-text">Question content...</div>
        </div>
        <button class="fs-btn" onclick="toggleFS()">Full Screen (F)</button>
    </div>

    <div id="admin-modal-overlay" class="hidden">
        <div class="admin-modal-content">
            <span id="admin-q-title" class="q-title-text"></span>
            <div id="admin-q-text" class="q-body-text"></div>
            <div class="modal-btn-group">
                <button class="ctrl-btn btn-check" onclick="markCorrect()">CORRECT</button>
                <button class="ctrl-btn btn-wrong" onclick="markWrong()">WRONG</button>
                <button class="ctrl-btn btn-close" onclick="closeQuestionAdmin()">CLOSE</button>
            </div>
        </div>
    </div>

    <div id="main-section" class="hidden">
        <h1 id="admin-header">GUESS-piratory Questions</h1>
        
        <div class="grid">
            <div id="q1" class="box" onclick="adminOpenQ('q1', 'GUESS-tion 1', 'I move up and down when you breathe in and out, Helping your lungs there is no doubt. What am I?')">Q1</div>
            <div id="q2" class="box" onclick="adminOpenQ('q2', 'GUESS-tion 2', 'I’m behind your nose and mouth, you see, Air passes through me easily. What am I?')">Q2</div>
            <div id="q3" class="box" onclick="adminOpenQ('q3', 'GUESS-tion 3', 'I sit on your face and help you smell, I take in air and filter it well. What am I?')">Q3</div>
            <div id="q4" class="box" onclick="adminOpenQ('q4', 'GUESS-tion 4', 'I help you speak and make a sound, Air passing through me gets voice all around. What am I?')">Q4</div>
            <div id="q5" class="box" onclick="adminOpenQ('q5', 'GUESS-tion 5', 'I branch like a tree inside your chest, Carrying air to lungs at their best. What am I?')">Q5</div>
            <div id="q6" class="box" onclick="adminOpenQ('q6', 'GUESS-tion 6', 'I’m the whole system that helps you breathe, From nose to lungs, I work with ease. What am I?')">Q6</div>
            <div id="q7" class="box" onclick="adminOpenQ('q7', 'GUESS-tion 7', 'I’m a tube where air passes through, From throat to lungs that’s what I do. What am I?')">Q7</div>
            <div id="q8" class="box" onclick="adminOpenQ('q8', 'GUESS-tion 8', 'Inside your nose is where I stay, Warming the air along the way. What am I?')">Q8</div>
            <div id="q9" class="box" onclick="adminOpenQ('q9', 'GUESS-tion 9', 'I’m where food and air both pass through, Your tongue helps me do what I do. What am I?')">Q9</div>
            <div id="q10" class="box" onclick="adminOpenQ('q10', 'GUESS-tion 10', 'I come in pairs inside your chest, I help you breathe and do my best. What am I?')">Q10</div>
        </div>

        <p style="font-size: 0.8rem; color: #aaa; margin-top:20px;">
            [S] Play | [P] Pause | [N] Next | [F] Fullscreen
        </p>
        <div class="reset-link" onclick="resetServer()">Full System Reset</div>
    </div>

    <div class="music-controls" id="music-ui">
        <button class="m-btn" onclick="musicAction('play')">▶</button>
        <button class="m-btn" onclick="musicAction('pause')">⏸</button>
        <button class="m-btn" onclick="musicAction('restart')">🔄</button>
    </div>

    <script>
        const socket = io();
        let myName = "", myColor = "", isAdmin = false, currentWinner = null, currentQId = null;
        let player, currentTrackIndex = 0;
        const playlist = ['WhUtuhhv1eo', 'C2gt0C4B6vk', 'e1cg3oqDaxk', 'X--47-4Ut2c', 'Ruk1_mtXzHM'];

        // YT API
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '0', width: '0', videoId: playlist[currentTrackIndex],
                events: { 'onStateChange': (e) => { if(e.data === 0) nextTrack(); } }
            });
        }
        function nextTrack() {
            currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
            player.loadVideoById(playlist[currentTrackIndex]);
        }

        function musicAction(action) {
            if (!player) return;
            
            if (action === 'play') {
                player.playVideo();
            } else if (action === 'pause') {
                player.pauseVideo();
            } else if (action === 'restart') {
                player.seekTo(0);
                player.playVideo();
            }
        }

        function login() {
    const nameInput = document.getElementById('groupName').value.trim();
    const passInput = document.getElementById('groupPass').value.trim();
    if (!nameInput) return alert("Enter a name/color!");

    // List of supported CSS colors or your specific game colors
    const colors = ["red", "blue", "green", "teal", "plum", "orange", "magenta", "maroon", "tan", "gold"];
    
    myName = nameInput; // Keeps "Red Jr."
    
    // Find if the input contains any of our colors
    const detectedColor = colors.find(c => nameInput.toLowerCase().includes(c));
    
    // Fallback to a default if no color is found, otherwise use the detected one
    myColor = detectedColor || "#2c3e50"; 

    document.getElementById('login-screen').classList.add('hidden');
    
    if (passInput === "jriv123") {
        isAdmin = true;
        document.getElementById('main-section').classList.remove('hidden');
        socket.emit('admin-logged-in');
    } else {
        document.getElementById('wait-screen').classList.remove('hidden');
        document.body.style.backgroundColor = myColor; // Sets background to "red"
        document.getElementById('wait-text').innerText = myName.toUpperCase() + " READY"; // Shows "RED JR READY"
    }

    if(player && typeof player.playVideo === 'function') {
        player.playVideo();
    }
}

        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'f') toggleFS();
            if (isAdmin && player) {
                if (key === 's') player.playVideo();
                if (key === 'p') player.pauseVideo();
                if (key === 'n') nextTrack();
            }
        });

        function toggleFS() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else if (document.exitFullscreen) document.exitFullscreen();
        }

        // ADMIN MODAL LOGIC
        function adminOpenQ(id, title, text) {
            currentQId = id;
            socket.emit('open-question', { title, text });
            
            document.body.classList.add('modal-open');
            document.getElementById('admin-modal-overlay').classList.remove('hidden');
            document.getElementById('admin-q-title').innerText = title;
            document.getElementById('admin-q-text').innerText = text;
        }

        function closeQuestionAdmin() {
            socket.emit('close-question');
            document.body.classList.remove('modal-open');
            document.getElementById('admin-modal-overlay').classList.add('hidden');
        }

        function markCorrect() {
            if (currentWinner && currentQId) {
                socket.emit('question-result', { id: currentQId, color: currentWinner.color, status: 'correct' });
                closeQuestionAdmin();
            } else alert("Wait for a click!");
        }

        function markWrong() {
            socket.emit('question-result', { status: 'wrong' });
            closeQuestionAdmin();
        }

        function sendBuzz() { socket.emit('buzz', { name: myName, color: myColor }); }
        function resetServer() { socket.emit('reset'); }

        // SOCKETS
        socket.on('show-question', (data) => {
            if (!isAdmin) {
                const qBox = document.getElementById('live-q-notif');
                qBox.classList.remove('hidden');
                document.getElementById('q-title-sync').innerText = data.title;
                document.getElementById('q-text-sync').innerText = data.text;
            }
        });

        socket.on('hide-question', () => {
            if (!isAdmin) document.getElementById('live-q-notif').classList.add('hidden');
        });

        socket.on('buzzed', (winner) => {
    currentWinner = winner; 
    document.body.style.backgroundColor = winner.color;
    
    // This creates "BLUE JAMES BUZZED!"
    const msg = winner.name.toUpperCase() + " WANTS TO ANSWER!";
    
    if (isAdmin) {
        // 'admin-q-title' is the ID for the yellow text in your modal
        document.getElementById('admin-q-title').innerText = msg;
    } else {
        document.getElementById('wait-text').innerText = msg;
        document.getElementById('buzz-btn').disabled = true;
    }
});

        socket.on('update-grid', (data) => {
            const box = document.getElementById(data.id);
            if (box) {
                box.style.background = data.color;
                box.style.color = "white";
                box.onclick = null;
                box.innerText = "✓";
            }
        });

        socket.on('reset-buzzer', (isFullReset) => {
    currentWinner = null;
    currentQId = null;

    // 1. Reset Background Colors
    if (isAdmin) {
        document.body.style.backgroundColor = "#1a1a2e"; 
    } else {
        document.body.style.backgroundColor = myColor;
        document.getElementById('wait-text').innerText = myName.toUpperCase() + " READY";
        document.getElementById('buzz-btn').disabled = false;
        // Hide any active question notifications
        document.getElementById('live-q-notif').classList.add('hidden');
    }

    // 2. Clear the Question Grid (Only if it's a Full Reset)
    if (isFullReset) {
        const boxes = document.querySelectorAll('.box');
        boxes.forEach((box, index) => {
            const qNum = index + 1;
            const qId = 'q' + qNum;
            
            // Restore visual style
            box.style.background = ""; 
            box.style.color = "";
            box.innerText = "Q" + qNum;
            
            // Restore click functionality
            box.onclick = function() {
                // Manually re-triggering the adminOpenQ logic
                // Make sure this matches your existing grid content
                const questions = [
    'I move up and down when you breathe in and out, Helping your lungs there is no doubt. What am I?',
    'I’m behind your nose and mouth, you see, Air passes through me easily. What am I?',
    'I sit on your face and help you smell, I take in air and filter it well. What am I?',
    'I help you speak and make a sound, Air passing through me gets voice all around. What am I?',
    'I branch like a tree inside your chest, Carrying air to lungs at their best. What am I?',
    'I’m the whole system that helps you breathe, From nose to lungs, I work with ease. What am I?',
    'I’m a tube where air passes through, From throat to lungs that’s what I do. What am I?',
    'Inside your nose is where I stay, Warming the air along the way. What am I?',
    'I’m where food and air both pass through, Your tongue helps me do what I do. What am I?',
    'I come in pairs inside your chest, I help you breathe and do my best. What am I?'
];
                adminOpenQ(qId, 'GUESS-tion ' + qNum, questions[index]);
            };
        });
        alert("System Fully Reset for a New Game!");
    }
});

        socket.on('start-music', () => {
            console.log("Admin logged in. Starting music...");
            if(player && typeof player.playVideo === 'function') {
                player.playVideo();
            }
        });
    </script>
</body>
</html>
