<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Group Buzzer System</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --bg-color: #2c3e50; --accent: #27ae60; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: white; transition: 0.4s; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .hidden { display: none !important; }
        
        /* Login */
        #login-screen { flex: 1; display: flex; justify-content: center; align-items: center; }
        .login-card { background: white; color: #333; padding: 40px; border-radius: 15px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { display: block; width: 250px; margin: 10px auto; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 1rem; }
        .login-btn { background: var(--accent); color: white; border: none; padding: 10px 30px; border-radius: 5px; cursor: pointer; font-size: 1rem; font-weight: bold; }

        /* Screens */
        #wait-screen, #main-section { height: 100vh; text-align: center; overflow-y: auto; padding: 20px; }
        #wait-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; }

        /* Question Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; max-width: 1000px; margin: 20px auto; }
        .box { background: rgba(255, 255, 255, 0.2); border: 2px solid rgba(255, 255, 255, 0.4); padding: 30px; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        .box:hover { background: rgba(255, 255, 255, 0.3); transform: scale(1.05); }

        /* Modal Styles */
        #modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: white; color: #333; padding: 40px; border-radius: 20px; max-width: 500px; width: 90%; text-align: center; position: relative; }
        .close-modal { position: absolute; top: 10px; right: 20px; font-size: 2rem; cursor: pointer; }

        /* Buzzer */
        #buzz-btn { width: 180px; height: 180px; border-radius: 50%; border: 8px solid white; background: #e74c3c; color: white; font-size: 1.8rem; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 10px #c0392b; margin: 20px auto; display: block; }
        #buzz-btn:active { transform: translateY(4px); box-shadow: 0 2px #c0392b; }
        #buzz-btn:disabled { background: #95a5a6; box-shadow: none; opacity: 0.5; cursor: not-allowed; }

        .reset-link { margin-top: 20px; color: #ddd; cursor: pointer; text-decoration: underline; opacity: 0.7; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2>Buzzer Login</h2>
            <input type="text" id="groupName" placeholder="Enter Group Color (e.g. Red)">
            <input type="password" id="groupPass" placeholder="Admin Password (Optional)">
            <button class="login-btn" onclick="login()">Enter Game</button>
        </div>
    </div>

    <div id="wait-screen" class="hidden">
        <h1 id="wait-text">READY</h1>
        <button id="buzz-btn" onclick="sendBuzz()">BUZZ!</button>
    </div>

    <div id="main-section" class="hidden">
        <h1 id="admin-header">Admin Control Panel</h1>
        <div class="grid">
            <div class="box" onclick="openModal('Question 1', 'What is the largest planet in our solar system?')">Q1</div>
            <div class="box" onclick="openModal('Question 2', 'What is 15 x 4?')">Q2</div>
            <div class="box" onclick="openModal('Question 3', 'Which element has the symbol O?')">Q3</div>
            <div class="box" onclick="openModal('Question 4', 'Who painted the Mona Lisa?')">Q4</div>
            <div class="box" onclick="openModal('Question 5', 'What is the capital of Japan?')">Q5</div>
            <div class="box" onclick="openModal('Question 6', 'How many legs does a spider have?')">Q6</div>
        </div>
        <p>Winners will be announced here!</p>
        <div class="reset-link" onclick="resetServer()">Full System Reset</div>
    </div>

    <div id="modal-overlay" class="hidden">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2 id="modal-title" style="color: var(--accent)"></h2>
            <hr>
            <p id="modal-body" style="font-size: 1.5rem; line-height: 1.6;"></p>
        </div>
    </div>

    <script>
        const socket = io();
        let myName = "";
        let myColor = "";
        const ADMIN_PASS = "123"; 

        function login() {
            const nameInput = document.getElementById('groupName').value.trim();
            const passInput = document.getElementById('groupPass').value.trim();

            if (!nameInput) return alert("Please enter a group color!");

            myName = nameInput;
            myColor = nameInput.toLowerCase();
            document.body.style.backgroundColor = myColor;
            document.getElementById('login-screen').classList.add('hidden');

            if (passInput === ADMIN_PASS) {
                document.getElementById('main-section').classList.remove('hidden');
                document.body.style.backgroundColor = "#2c3e50"; // Neutral for admin
            } else {
                document.getElementById('wait-screen').classList.remove('hidden');
                document.getElementById('wait-text').innerText = myName.toUpperCase() + " READY";
            }
        }

        // Modal Logic
        function openModal(title, text) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-body').innerText = text;
            document.getElementById('modal-overlay').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.add('hidden');
        }

        // Buzzer Logic
        function sendBuzz() {
            socket.emit('buzz', { name: myName, color: myColor });
        }

        function resetServer() {
            socket.emit('reset');
        }

        // Server Listeners
        socket.on('buzzed', (winner) => {
            document.body.style.backgroundColor = winner.color;
            const msg = winner.name.toUpperCase() + " BUZZED FIRST!";
            
            // Update UI for everyone
            if (!document.getElementById('wait-screen').classList.contains('hidden')) {
                document.getElementById('wait-text').innerText = msg;
                document.getElementById('buzz-btn').disabled = true;
            } else {
                document.getElementById('admin-header').innerText = msg;
            }
        });

        socket.on('reset-buzzer', () => {
            // Revert background to group color (or neutral for admin)
            if (!document.getElementById('main-section').classList.contains('hidden')) {
                document.body.style.backgroundColor = "#2c3e50";
                document.getElementById('admin-header').innerText = "Admin Control Panel";
            } else {
                document.body.style.backgroundColor = myColor;
                document.getElementById('wait-text').innerText = myName.toUpperCase() + " READY";
                document.getElementById('buzz-btn').disabled = false;
            }
        });
    </script>
</body>
</html>
