<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Group Buzzer System</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --bg-color: #2c3e50; --accent: #27ae60; --danger: #e74c3c; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: white; transition: 0.4s; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .hidden { display: none !important; }
        
        /* Login */
        #login-screen { flex: 1; display: flex; justify-content: center; align-items: center; }
        .login-card { background: white; color: #333; padding: 40px; border-radius: 15px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { display: block; width: 250px; margin: 10px auto; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 1rem; }
        .login-btn { background: var(--accent); color: white; border: none; padding: 10px 30px; border-radius: 5px; cursor: pointer; font-size: 1rem; font-weight: bold; }

        /* Screens */
        #wait-screen, #main-section { height: 100vh; text-align: center; overflow-y: auto; padding: 20px; position: relative; }
        #wait-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; }

        /* Question Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; max-width: 1000px; margin: 20px auto; }
        .box { background: rgba(255, 255, 255, 0.2); border: 2px solid rgba(255, 255, 255, 0.4); padding: 30px; border-radius: 12px; cursor: pointer; transition: 0.3s; font-weight: bold; font-size: 1.2rem; }
        .box:hover { background: rgba(255, 255, 255, 0.3); transform: scale(1.05); }

        /* Modal Styles */
        #modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: white; color: #333; padding: 40px; border-radius: 20px; max-width: 500px; width: 90%; text-align: center; position: relative; }
        .admin-controls { margin-top: 20px; display: flex; justify-content: center; gap: 10px; }
        .ctrl-btn { border: none; padding: 10px 20px; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; }
        .btn-check { background: var(--accent); }
        .btn-wrong { background: var(--danger); }

        /* Buzzer */
        #buzz-btn { width: 180px; height: 180px; border-radius: 50%; border: 8px solid white; background: #e74c3c; color: white; font-size: 1.8rem; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 10px #c0392b; margin: 20px auto; display: block; }
        #buzz-btn:active { transform: translateY(4px); box-shadow: 0 2px #c0392b; }
        #buzz-btn:disabled { background: #95a5a6; box-shadow: none; opacity: 0.5; cursor: not-allowed; }

        /* Helper Buttons */
        .fs-btn { position: absolute; bottom: 20px; right: 20px; background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .reset-link { margin-top: 20px; color: #ddd; cursor: pointer; text-decoration: underline; opacity: 0.7; font-size: 0.8rem; }
        #live-q-notif { background: rgba(255,255,0,0.2); border: 1px solid yellow; padding: 10px; margin-bottom: 20px; border-radius: 10px; font-style: italic; }
        
        /* YouTube Hidden Container */
        #yt-player { position: absolute; top: -1000px; left: -1000px; visibility: hidden; pointer-events: none; }
    </style>
</head>
<body>

    <div id="yt-player"></div>

    <div id="login-screen">
        <div class="login-card">
            <h2>Buzzer Login</h2>
            <input type="text" id="groupName" placeholder="Group Color (e.g. Red)">
            <input type="password" id="groupPass" placeholder="Admin Password">
            <button class="login-btn" onclick="login()">Enter Game</button>
        </div>
    </div>

    <div id="wait-screen" class="hidden">
        <div id="live-q-notif" class="hidden">QUESTION: <span id="q-text-sync"></span></div>
        <h1 id="wait-text">READY</h1>
        <button id="buzz-btn" onclick="sendBuzz()">BUZZ!</button>
        <button class="fs-btn" onclick="toggleFS()">Full Screen (F)</button>
    </div>

    <div id="main-section" class="hidden">
        <h1 id="admin-header">Admin Control Panel</h1>
        <div class="grid">
            <div id="q1" class="box" onclick="adminOpenQ('q1', 'Question 1', 'Largest planet in our solar system?')">Q1</div>
            <div id="q2" class="box" onclick="adminOpenQ('q2', 'Question 2', 'What is 15 x 4?')">Q2</div>
            <div id="q3" class="box" onclick="adminOpenQ('q3', 'Question 3', 'Element symbol for Oxygen?')">Q3</div>
            <div id="q4" class="box" onclick="adminOpenQ('q4', 'Question 4', 'Who painted Mona Lisa?')">Q4</div>
            <div id="q5" class="box" onclick="adminOpenQ('q5', 'Question 5', 'Capital of Japan?')">Q5</div>
            <div id="q6" class="box" onclick="adminOpenQ('q6', 'Question 6', 'How many legs on a spider?')">Q6</div>
        </div>
        <p style="font-size: 0.8rem; color: #aaa;">Admin Keys: [S] Play | [P] Pause | [N] Next Song | [F] Fullscreen</p>
        <div class="reset-link" onclick="resetServer()">Full System Reset</div>
    </div>

    <div id="modal-overlay" class="hidden">
        <div class="modal-content">
            <h2 id="modal-title"></h2>
            <hr>
            <p id="modal-body" style="font-size: 1.5rem;"></p>
            
            <div id="admin-modal-controls" class="admin-controls hidden">
                <button class="ctrl-btn btn-check" onclick="markCorrect()">CHECK (Correct)</button>
                <button class="ctrl-btn btn-wrong" onclick="markWrong()">WRONG</button>
            </div>
            <br>
            <button onclick="closeModal()">Close Window</button>
        </div>
    </div>

    <script>
        const socket = io();
        let myName = "";
        let myColor = "";
        let isAdmin = false;
        let currentWinner = null;
        let currentQId = null;
        
        // --- MULTIPLE MUSIC CONFIGURATION ---
        let player; 
        let currentTrackIndex = 0;
        // ADD YOUR YOUTUBE VIDEO IDs HERE IN ORDER
        const playlist = [
            'jfKfPfyJRdk', // Track 1
            'dQw4w9WgXcQ', // Track 2
            '5qap5aO4i9A'  // Track 3
        ];

        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '0',
                width: '0',
                videoId: playlist[currentTrackIndex],
                events: {
                    'onReady': () => console.log("Music Ready"),
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerStateChange(event) {
            // If the song ends (state 0), play the next one
            if (event.data === YT.PlayerState.ENDED) {
                nextTrack();
            }
        }

        function nextTrack() {
            currentTrackIndex++;
            if (currentTrackIndex >= playlist.length) currentTrackIndex = 0; // Loop back to start
            player.loadVideoById(playlist[currentTrackIndex]);
        }

        function login() {
            const nameInput = document.getElementById('groupName').value.trim();
            const passInput = document.getElementById('groupPass').value.trim();
            if (!nameInput) return alert("Enter a color!");

            myName = nameInput;
            myColor = nameInput.toLowerCase();
            document.getElementById('login-screen').classList.add('hidden');

            if (passInput === "123") {
                isAdmin = true;
                document.getElementById('main-section').classList.remove('hidden');
                document.getElementById('admin-modal-controls').classList.remove('hidden');
                if(player) player.playVideo(); 
            } else {
                document.getElementById('wait-screen').classList.remove('hidden');
                document.body.style.backgroundColor = myColor;
                document.getElementById('wait-text').innerText = myName.toUpperCase() + " READY";
            }
        }

        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'f') toggleFS();
            if (key === 'e' && document.fullscreenElement) document.exitFullscreen();
            
            if (isAdmin && player) {
                if (key === 's') player.playVideo();
                if (key === 'p') player.pauseVideo();
                if (key === 'n') nextTrack(); // Skip to next song
            }
        });

        function toggleFS() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }

        function adminOpenQ(id, title, text) {
            currentQId = id;
            socket.emit('open-question', { title, text });
            openModalUI(title, text);
        }

        function openModalUI(title, text) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-body').innerText = text;
            document.getElementById('modal-overlay').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.add('hidden');
            socket.emit('close-question');
        }

        function markCorrect() {
            if (currentWinner && currentQId) {
                socket.emit('question-result', { id: currentQId, color: currentWinner.color, status: 'correct' });
                closeModal();
            } else alert("Wait for a buzz!");
        }

        function markWrong() {
            socket.emit('question-result', { status: 'wrong' });
            closeModal();
        }

        function sendBuzz() {
            socket.emit('buzz', { name: myName, color: myColor });
        }

        function resetServer() {
            socket.emit('reset');
        }

        socket.on('show-question', (data) => {
            if (!isAdmin) {
                document.getElementById('live-q-notif').classList.remove('hidden');
                document.getElementById('q-text-sync').innerText = data.text;
                openModalUI(data.title, data.text);
            }
        });

        socket.on('hide-question', () => {
            if (!isAdmin) {
                document.getElementById('modal-overlay').classList.add('hidden');
                document.getElementById('live-q-notif').classList.add('hidden');
            }
        });

        socket.on('buzzed', (winner) => {
            currentWinner = winner;
            document.body.style.backgroundColor = winner.color;
            if (isAdmin) document.getElementById('admin-header').innerText = winner.name.toUpperCase() + " BUZZED!";
            else {
                document.getElementById('wait-text').innerText = winner.name.toUpperCase() + " BUZZED!";
                document.getElementById('buzz-btn').disabled = true;
            }
        });

        socket.on('update-grid', (data) => {
            const box = document.getElementById(data.id);
            if (box) {
                box.style.backgroundColor = data.color;
                box.style.color = "white";
                box.onclick = null;
            }
        });

        socket.on('reset-buzzer', () => {
            currentWinner = null;
            if (isAdmin) {
                document.body.style.backgroundColor = "#2c3e50";
                document.getElementById('admin-header').innerText = "Admin Control Panel";
            } else {
                document.body.style.backgroundColor = myColor;
                document.getElementById('wait-text').innerText = myName.toUpperCase() + " READY";
                document.getElementById('buzz-btn').disabled = false;
            }
        });
    </script>
</body>
</html>
